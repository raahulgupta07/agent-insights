<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>City Agent robot — Claude-Code style (animated)</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--clay:#C2683F;--clay2:#A8542F;--ink:#1f2328;--line:#E7E5DD;--bg:#FBFAF8}
  *{box-sizing:border-box}
  body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:30px}
  .mono{font-family:ui-monospace,Menlo,monospace}

  /* ===== ROBOT (pixel Claude-Code style) ===== */
  .stage{position:relative;width:230px;height:200px;display:flex;align-items:center;justify-content:center}
  .robot{position:relative;transition:transform .3s}
  .robot.bob{animation:bob 2.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .robot.shake{animation:shake .4s linear infinite}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}

  /* antenna */
  .antenna{position:absolute;left:50%;top:-16px;transform:translateX(-50%);width:5px;height:14px;background:var(--clay2);border-radius:3px}
  .antenna::before{content:'';position:absolute;left:50%;top:-8px;transform:translateX(-50%);width:11px;height:11px;border-radius:50%;background:var(--clay)}
  .antenna.live::before{animation:beac 1s infinite}
  @keyframes beac{0%,100%{box-shadow:0 0 0 0 rgba(194,104,63,.6);background:var(--clay)}50%{box-shadow:0 0 0 8px rgba(194,104,63,0);background:#E89B6E}}

  /* head */
  .head{width:150px;height:96px;background:linear-gradient(160deg,#C2683F,#B05D38);border-radius:30px;position:relative;box-shadow:inset 0 -6px 0 rgba(0,0,0,.08),0 10px 24px rgba(168,84,47,.28)}
  /* ears */
  .ear{position:absolute;top:34px;width:12px;height:26px;background:var(--clay2);border-radius:4px}
  .ear.l{left:-10px}.ear.r{right:-10px}

  /* eyes */
  .eyes{position:absolute;top:34px;left:0;right:0;display:flex;justify-content:center;gap:30px}
  .eye{width:22px;height:22px;background:#1f2328;border-radius:5px;position:relative;transition:all .2s;overflow:hidden}
  .eye .pupil{position:absolute;inset:0;background:#1f2328;border-radius:5px;transition:transform .25s}
  /* glow inside eyes when active */
  .eye.glow{background:#231a16;box-shadow:0 0 10px rgba(232,155,110,.9) inset}
  .eye.glow .pupil{background:radial-gradient(circle at 50% 40%,#E89B6E,#1f2328 70%)}
  /* blink */
  .blink .eye{animation:blink 4s infinite}
  @keyframes blink{0%,94%,100%{height:22px;margin-top:0}97%{height:3px;margin-top:9px}}
  /* thinking: eyes scan left-right */
  .think .pupil{animation:scan 1.3s ease-in-out infinite}
  @keyframes scan{0%,100%{transform:translateX(-5px)}50%{transform:translateX(5px)}}
  /* happy ^ ^ */
  .happy .eye{height:11px;border-radius:11px 11px 3px 3px;margin-top:6px}
  /* error x x */
  .err .eye{background:transparent;box-shadow:none}
  .err .eye::before,.err .eye::after{content:'';position:absolute;top:9px;left:0;width:22px;height:3px;background:#7a1f1f;border-radius:2px}
  .err .eye::before{transform:rotate(45deg)}.err .eye::after{transform:rotate(-45deg)}

  /* mouth */
  .mouth{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);width:40px;height:6px;background:#1f2328;border-radius:4px;transition:all .2s}
  .think .mouth{width:18px}
  .happy .mouth{height:14px;border-radius:0 0 16px 16px}
  .proc .mouth{animation:talk .35s steps(2) infinite}
  @keyframes talk{0%{width:40px}50%{width:18px;height:10px}100%{width:40px}}

  /* legs/feet */
  .legs{display:flex;justify-content:center;gap:22px;margin-top:10px}
  .foot-grp{display:flex;gap:6px}
  .foot{width:10px;height:18px;background:var(--clay2);border-radius:3px}
  .walk .foot{animation:walk .5s ease-in-out infinite}
  .walk .foot:nth-child(2){animation-delay:.25s}
  @keyframes walk{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

  /* energy ring (power) when processing */
  .ring{position:absolute;width:170px;height:170px;border-radius:50%;border:2px dashed var(--clay);opacity:0;pointer-events:none}
  .proc-on .ring{opacity:.5;animation:spin 3s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ring2{position:absolute;width:200px;height:200px;border-radius:50%;border:2px solid rgba(194,104,63,.25);opacity:0}
  .proc-on .ring2{opacity:1;animation:pulse 1.6s ease-out infinite}
  @keyframes pulse{0%{transform:scale(.85);opacity:.5}100%{transform:scale(1.15);opacity:0}}
  /* spark particles */
  .spark{position:absolute;width:6px;height:6px;border-radius:50%;background:#E89B6E;opacity:0}
  .proc-on .spark{animation:fly 1.4s ease-out infinite}
  @keyframes fly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}

  /* thought bubble dots */
  .thought{position:absolute;top:-34px;right:30px;display:flex;gap:5px;opacity:0;transition:opacity .2s}
  .think-on .thought{opacity:1}
  .thought i{width:7px;height:7px;border-radius:50%;background:var(--clay);display:block;animation:td 1.2s infinite}
  .thought i:nth-child(2){animation-delay:.2s}.thought i:nth-child(3){animation-delay:.4s}
  @keyframes td{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}

  /* ===== UI ===== */
  .label{font-weight:700;font-size:15px}
  .sub{color:#6b6b6b;font-size:13px}
  .btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:#3f3f3f}
  .btn:hover{border-color:var(--clay);color:var(--clay)}
  .btn.active{background:var(--clay);color:#fff;border-color:var(--clay)}
  .console{width:340px;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .chead{padding:9px 12px;border-bottom:1px solid var(--line);font-size:12px;font-weight:700;color:#6b6b6b;display:flex;align-items:center;gap:7px}
  .clog{padding:8px 12px;font-size:12.5px;height:120px;overflow-y:auto}
  .clog div{padding:3px 0;color:#6b6b6b;animation:fin .25s}
  @keyframes fin{from{opacity:0;transform:translateX(-3px)}to{opacity:1}}
  .dotpill{width:8px;height:8px;border-radius:50%;background:var(--clay);display:inline-block}
</style>
</head>
<body>

  <div class="stage" id="stage">
    <div class="ring2"></div><div class="ring"></div>
    <span class="spark" style="--dx:-70px;--dy:-50px;left:50%;top:40%"></span>
    <span class="spark" style="--dx:75px;--dy:-40px;left:50%;top:40%;animation-delay:.3s"></span>
    <span class="spark" style="--dx:-60px;--dy:55px;left:50%;top:45%;animation-delay:.6s"></span>
    <span class="spark" style="--dx:65px;--dy:60px;left:50%;top:45%;animation-delay:.9s"></span>

    <div class="robot bob blink" id="robot">
      <div class="thought"><i></i><i></i><i></i></div>
      <div class="antenna live" id="antenna"></div>
      <div class="head">
        <div class="ear l"></div><div class="ear r"></div>
        <div class="eyes"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div>
        <div class="mouth"></div>
      </div>
      <div class="legs">
        <div class="foot-grp"><div class="foot"></div><div class="foot"></div></div>
        <div class="foot-grp"><div class="foot"></div><div class="foot"></div></div>
      </div>
    </div>
  </div>

  <div style="text-align:center">
    <div class="label" id="stateLabel">Idle</div>
    <div class="sub" id="stateSub">City Agent · waiting for work</div>
  </div>

  <div class="btns">
    <button class="btn active" onclick="setState('idle',this)">Idle</button>
    <button class="btn" onclick="setState('thinking',this)">Thinking</button>
    <button class="btn" onclick="setState('processing',this)">Processing</button>
    <button class="btn" onclick="setState('success',this)">Success</button>
    <button class="btn" onclick="setState('error',this)">Error</button>
    <button class="btn" onclick="runDemo(this)">▶ Run full demo</button>
  </div>

  <div class="console">
    <div class="chead"><span class="dotpill" id="cdot"></span><span id="ctitle">activity</span></div>
    <div class="clog" id="clog"><div>ready.</div></div>
  </div>

<script>
const robot=document.getElementById('robot'), stage=document.getElementById('stage'),
  ant=document.getElementById('antenna'), L=document.getElementById('stateLabel'),
  S=document.getElementById('stateSub'), clog=document.getElementById('clog');
const STATES={
  idle:{cls:['bob','blink'],label:'Idle',sub:'City Agent · waiting for work',ant:true},
  thinking:{cls:['bob','think','think-on'],label:'Thinking…',sub:'planning the next step',ant:true},
  processing:{cls:['walk','proc','proc-on','glow'],label:'Processing',sub:'merging · training · scanning',ant:true},
  success:{cls:['bob','happy'],label:'Done',sub:'trained — ready to answer',ant:false},
  error:{cls:['shake','err'],label:'Problem',sub:'a step failed — check logs',ant:false},
};
function clearCls(){robot.className='robot';stage.classList.remove('proc-on','think-on');
  robot.querySelectorAll('.eye').forEach(e=>e.classList.remove('glow'));}
function setState(s,btn){
  clearCls();const st=STATES[s];
  st.cls.forEach(c=>{ if(c==='proc-on'||c==='think-on') stage.classList.add(c);
    else if(c==='glow') robot.querySelectorAll('.eye').forEach(e=>e.classList.add('glow'));
    else robot.classList.add(c);});
  L.textContent=st.label;S.textContent=st.sub;ant.classList.toggle('live',st.ant);
  document.getElementById('cdot').style.background=s==='error'?'#7a1f1f':s==='success'?'#2f7d34':'#C2683F';
  if(btn){document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
}
function log(t){const d=document.createElement('div');d.innerHTML=t;clog.appendChild(d);clog.scrollTop=clog.scrollHeight}
let dt=null;
function runDemo(btn){
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  clog.innerHTML='';clearTimeout(dt);
  const steps=[
    ['thinking','reading 6 monthly files + Definitions.xlsx',900],
    ['processing','merging 21,240 rows · adding report_month',1100],
    ['processing','matching 36 columns → 36/36 ✓',1000],
    ['thinking','extracting KPI formulas from deck',900],
    ['processing','writing descriptions · drafting instructions',1100],
    ['processing','compliance scan · District 72% missing ⚠',1000],
    ['success','trained — Ensure dropout 1995 ✓ · 2 to approve',1400],
  ];
  let i=0;
  (function go(){
    if(i>=steps.length){setState('idle');return}
    const [st,msg,ms]=steps[i];setState(st);log((st==='success'?'✅ ':st==='processing'?'⚙ ':'… ')+msg);
    i++;dt=setTimeout(go,ms);
  })();
}
setState('idle');
</script>
</body>
</html>
