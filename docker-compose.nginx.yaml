# =============================================================================
# CityAgent Analytics â€” nginx reverse proxy stack (HTTP)
# =============================================================================
#
# Use this when you front the app with nginx (the default for this deployment).
# nginx publishes the host port and proxies to the app over the internal network;
# the app itself is NOT published directly (more secure â€” only nginx is exposed).
#
# Quick start:
#   1. cp .env.example .env        # then edit .env (encryption key, admin, HTTP_PORT)
#   2. docker compose -f docker-compose.nginx.yaml up -d --build
#   3. open http://<server-ip>:<HTTP_PORT>     (HTTP_PORT defaults to 8001)
#
# To change the public port, set HTTP_PORT in .env (e.g. HTTP_PORT=8001) and set
# DASH_BASE_URL to match (http://<server-ip>:8001). For HTTPS, add a 443 server
# block + certs in nginx/nginx.conf, or use the Caddy stack (docker-compose.yaml).
#
# Reads the same .env as the other compose files (POSTGRES_*, DASH_ENCRYPTION_KEY,
# DASH_ADMIN_*, HTTP_PORT).
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg18   # PG18 + pgvector preinstalled
    container_name: dash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashpassword}
      POSTGRES_DB: ${POSTGRES_DB:-dash}
    volumes:
      - postgres_data:/var/lib/postgresql   # PG18+: mount parent, not /data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dash} -d ${POSTGRES_DB:-dash}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dash-network

  redis:
    image: redis:7-alpine
    container_name: dash-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - dash-network

  app:
    # Self-contained build â€” runtime base folded into Dockerfile.
    build:
      context: .
      dockerfile: Dockerfile
    image: cityagent-analytics:dev
    container_name: dash-app
    restart: unless-stopped
    # No host port here on purpose â€” nginx fronts the app and reaches it over the
    # internal network at app:3000. The container always listens on 3000.
    expose:
      - "3000"
    environment:
      - ENVIRONMENT=production
      - DASH_DATABASE_URL=postgresql://${POSTGRES_USER:-dash}:${POSTGRES_PASSWORD:-dashpassword}@postgres:5432/${POSTGRES_DB:-dash}
      - DASH_ENCRYPTION_KEY=${DASH_ENCRYPTION_KEY:-}
      - DASH_LICENSE_KEY=${DASH_LICENSE_KEY:-}
      # First super-admin bootstrap (idempotent; ignored once any user exists)
      - DASH_ADMIN_EMAIL=${DASH_ADMIN_EMAIL:-}
      - DASH_ADMIN_PASSWORD=${DASH_ADMIN_PASSWORD:-}
      - DASH_ADMIN_NAME=${DASH_ADMIN_NAME:-Admin}
      - DASH_CONFIG_PATH=/app/dash-config.yaml
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # ---------------------------------------------------------------------
      # Hybrid feature flags. Product-visible, stable features default ON here
      # so a fresh nginx deploy is fully featured (Studios, Templates, Folder
      # Sync, Intelligence layer, etc.). Daemons, experimental + token-heavy
      # paths default OFF. Override any in .env, e.g. HYBRID_SUBAGENTS=1.
      # ---------------------------------------------------------------------
      # -- ON: visible product features --
      - HYBRID_STUDIOS=${HYBRID_STUDIOS:-1}
      - HYBRID_AGENT_TEMPLATES=${HYBRID_AGENT_TEMPLATES:-1}
      - HYBRID_FOLDER_SYNC=${HYBRID_FOLDER_SYNC:-1}
      - HYBRID_AGENT_ACL=${HYBRID_AGENT_ACL:-1}
      - HYBRID_AGENT_CHANNELS=${HYBRID_AGENT_CHANNELS:-1}
      - HYBRID_FOLLOWUPS=${HYBRID_FOLLOWUPS:-1}
      - HYBRID_SEMANTIC_LAYER=${HYBRID_SEMANTIC_LAYER:-1}
      - HYBRID_METRICS_CATALOG=${HYBRID_METRICS_CATALOG:-1}
      - HYBRID_PROFILE_V2=${HYBRID_PROFILE_V2:-1}
      - HYBRID_PROACTIVE_INSIGHTS=${HYBRID_PROACTIVE_INSIGHTS:-1}
      - HYBRID_GOLDEN_QUERIES=${HYBRID_GOLDEN_QUERIES:-1}
      - HYBRID_VERIFIED_METRICS=${HYBRID_VERIFIED_METRICS:-1}
      - HYBRID_QUERY_CACHE=${HYBRID_QUERY_CACHE:-1}
      - HYBRID_QUERY_LEARNING=${HYBRID_QUERY_LEARNING:-1}
      - HYBRID_RESULT_CACHE=${HYBRID_RESULT_CACHE:-1}
      - HYBRID_ANSWER_CACHE=${HYBRID_ANSWER_CACHE:-1}
      - HYBRID_DOMAIN_PACKS=${HYBRID_DOMAIN_PACKS:-1}
      - HYBRID_PACK_ROUTER=${HYBRID_PACK_ROUTER:-1}
      - HYBRID_TEACH_BOX=${HYBRID_TEACH_BOX:-1}
      - HYBRID_AGENT_MEMORY=${HYBRID_AGENT_MEMORY:-1}
      - HYBRID_AUTO_QUERIES=${HYBRID_AUTO_QUERIES:-1}
      - HYBRID_AUTO_EVALS=${HYBRID_AUTO_EVALS:-1}
      - HYBRID_AUTOTRAIN=${HYBRID_AUTOTRAIN:-1}
      - HYBRID_AUTOTRAIN_QA=${HYBRID_AUTOTRAIN_QA:-1}
      - HYBRID_AUTOTRAIN_PROFILE=${HYBRID_AUTOTRAIN_PROFILE:-1}
      - HYBRID_DUAL_SCHEMA=${HYBRID_DUAL_SCHEMA:-1}
      - HYBRID_ENGINEER_ASSETS=${HYBRID_ENGINEER_ASSETS:-1}
      - HYBRID_BRAIN_READ=${HYBRID_BRAIN_READ:-1}
      - HYBRID_DISTILLER=${HYBRID_DISTILLER:-1}
      - HYBRID_MEMORY_LOOP=${HYBRID_MEMORY_LOOP:-1}
      - HYBRID_CODE_BANK=${HYBRID_CODE_BANK:-1}
      - HYBRID_DOC_KNOWLEDGE=${HYBRID_DOC_KNOWLEDGE:-1}
      - HYBRID_EVAL_HARNESS=${HYBRID_EVAL_HARNESS:-1}
      - HYBRID_MERGE_SAME_SCHEMA=${HYBRID_MERGE_SAME_SCHEMA:-1}
      - HYBRID_SMART_HEADER=${HYBRID_SMART_HEADER:-1}
      - HYBRID_SCOPE_GATE=${HYBRID_SCOPE_GATE:-1}
      - HYBRID_DASH_VERSIONS=${HYBRID_DASH_VERSIONS:-1}
      # -- OFF: daemons / experimental / token-heavy (enable per .env) --
      - HYBRID_SKILLS=${HYBRID_SKILLS:-0}
      - HYBRID_SUBAGENTS=${HYBRID_SUBAGENTS:-0}
      - HYBRID_RECURSIVE=${HYBRID_RECURSIVE:-0}
      - HYBRID_SKILL_AUTOGROW=${HYBRID_SKILL_AUTOGROW:-0}
      - HYBRID_SKILL_OPTIMIZE=${HYBRID_SKILL_OPTIMIZE:-0}
      - HYBRID_SKILL_OPTIMIZE_DAEMON=${HYBRID_SKILL_OPTIMIZE_DAEMON:-0}
      - HYBRID_WORKFLOWS=${HYBRID_WORKFLOWS:-0}
      - HYBRID_CONTEXT_COMPACT=${HYBRID_CONTEXT_COMPACT:-0}
      - HYBRID_CONTEXT_COMPACT_LLM=${HYBRID_CONTEXT_COMPACT_LLM:-0}
      - HYBRID_BITEMPORAL=${HYBRID_BITEMPORAL:-0}
      - HYBRID_AMBIGUITY_GATE=${HYBRID_AMBIGUITY_GATE:-0}
      - HYBRID_FORECAST=${HYBRID_FORECAST:-0}
      - HYBRID_CODE_ENRICH=${HYBRID_CODE_ENRICH:-0}
      - HYBRID_SEMANTIC_SEARCH=${HYBRID_SEMANTIC_SEARCH:-0}
      - HYBRID_FEDERATION=${HYBRID_FEDERATION:-0}
      - HYBRID_BRAIN_GRAPH=${HYBRID_BRAIN_GRAPH:-0}
      - HYBRID_GOVERNANCE=${HYBRID_GOVERNANCE:-0}
      - HYBRID_QUOTAS=${HYBRID_QUOTAS:-0}
      - HYBRID_PACK_AUTOBIND=${HYBRID_PACK_AUTOBIND:-0}
      - HYBRID_JOIN_GRAPH=${HYBRID_JOIN_GRAPH:-0}
      - HYBRID_AUTOMAP=${HYBRID_AUTOMAP:-0}
      - HYBRID_COMPLIANCE_GATE=${HYBRID_COMPLIANCE_GATE:-0}
      - HYBRID_COLUMN_INTEL=${HYBRID_COLUMN_INTEL:-0}
      - HYBRID_AUTOTRAIN_ON_INDEX=${HYBRID_AUTOTRAIN_ON_INDEX:-0}
      # -- background daemons: OFF (single-node; enable deliberately) --
      - HYBRID_INSIGHT_DAEMON=${HYBRID_INSIGHT_DAEMON:-0}
      - EVAL_SCHEDULE_ENABLED=${EVAL_SCHEDULE_ENABLED:-0}
      - JOIN_MINE_ENABLED=${JOIN_MINE_ENABLED:-0}
      - STUDIO_LEARN_DAEMON_ENABLED=${STUDIO_LEARN_DAEMON_ENABLED:-0}
    volumes:
      - ./dash-config.yaml:/app/dash-config.yaml:ro
      - uploads_data:/app/backend/uploads
      - branding_data:/app/backend/branding_uploads
      - logs_data:/app/backend/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - dash-network

  nginx:
    image: nginx:1.27-alpine
    container_name: dash-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8001}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - dash-network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  branding_data:
    driver: local
  logs_data:
    driver: local

networks:
  dash-network:
    driver: bridge
