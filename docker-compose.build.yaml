# =============================================================================
# CityAgent Analytics - BUILD FROM SOURCE (own image, never pull upstream)
# =============================================================================
# Builds the app from THIS repo's Dockerfile instead of pulling
# bagofwords/bagofwords:latest. Use this for all hybrid-brain work so our
# branch's code actually ships.
#
#   docker compose -f docker-compose.build.yaml build
#   docker compose -f docker-compose.build.yaml up -d
#
# Reads the same .env (POSTGRES_*, APP_PORT, DASH_ENCRYPTION_KEY).
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg18   # PG18 + pgvector preinstalled (Phase 8 embeddings/graph)
    container_name: ca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashpassword}
      POSTGRES_DB: ${POSTGRES_DB:-dash}
    volumes:
      - ca_postgres_data:/var/lib/postgresql   # PG18+: mount the parent (data lands in a major-version subdir), NOT /data
    ports:
      - "${POSTGRES_PORT:-5439}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dash} -d ${POSTGRES_DB:-dash}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ca-network

  redis:
    image: redis:7-alpine
    container_name: ca-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6399}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - ca-network

  app:
    # Self-contained build — `docker compose up -d --build` builds everything
    # (runtime base folded into Dockerfile). App image = cityagent-analytics:dev.
    build:
      context: .
      dockerfile: Dockerfile
    image: cityagent-analytics:dev
    container_name: ca-app
    restart: unless-stopped
    # Real memory cap (cgroup) — the correct place to bound total memory, replacing
    # the per-worker RLIMIT_AS. Uncomment and size to ~70% of host RAM before prod.
    # Docker OOM-kills + restarts (unless-stopped) the container if exceeded.
    # mem_limit: ${APP_MEM_LIMIT:-8g}
    ports:
      - "${APP_PORT:-3007}:3000"
    environment:
      - ENVIRONMENT=production
      - DASH_DATABASE_URL=postgresql://${POSTGRES_USER:-dash}:${POSTGRES_PASSWORD:-dashpassword}@postgres:5432/${POSTGRES_DB:-dash}
      - DASH_ENCRYPTION_KEY=${DASH_ENCRYPTION_KEY:-}
      - DASH_LICENSE_KEY=${DASH_LICENSE_KEY:-}
      - DASH_CONFIG_PATH=/app/dash-config.yaml
      # Tier-2 scale-out: Redis backs the per-user skill-run concurrency cap across replicas.
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # Sandbox memory guard. The in-process RLIMIT_AS caps VIRTUAL address space
      # per worker — pandas/numpy/duckdb reserve huge virtual ranges, so a low cap
      # false-trips MemoryError server-wide. Default 0 = DISABLED; cap REAL memory
      # at the container/cgroup level instead (see mem_limit on the app service).
      - SANDBOX_MEM_LIMIT_MB=${SANDBOX_MEM_LIMIT_MB:-0}
      # First-run super-admin bootstrap. start.sh runs scripts/seed_admin.py ONCE
      # before uvicorn IF both email+password are non-empty in the CONTAINER env.
      # These MUST be passed through here — compose only uses .env for ${VAR}
      # interpolation, it does NOT auto-inject .env into the container. Set the
      # values in .env; seeder is idempotent (skips if the user already exists).
      - DASH_ADMIN_EMAIL=${DASH_ADMIN_EMAIL:-}
      - DASH_ADMIN_PASSWORD=${DASH_ADMIN_PASSWORD:-}
      - DASH_ADMIN_NAME=${DASH_ADMIN_NAME:-Admin}
      # NOTE: all ~50 HYBRID_* feature flags + skill-exec knobs are NO LONGER set
      # here. They live in the UI (Settings → Features), stored per-org in
      # organization_settings.config['hybrid_overrides'] and loaded at boot by
      # load_overrides_from_db(). Defaults are code-owned (hybrid_flags.py:
      # only SCOPE_GATE + DASH_VERSIONS default ON). Skill knobs / compaction
      # ratio also default in code. Do NOT re-add flag vars — they would shadow
      # the UI until an org sets an override.
      # restricted staging role (agent-queryability); empty -> register no-ops safely
      - AUTOTRAIN_STAGING_DB_USER=${AUTOTRAIN_STAGING_DB_USER:-}
      - AUTOTRAIN_STAGING_DB_PASSWORD=${AUTOTRAIN_STAGING_DB_PASSWORD:-}
      - AUTOTRAIN_STAGING_DB_HOST=${AUTOTRAIN_STAGING_DB_HOST:-}
      - AUTOTRAIN_STAGING_DB_PORT=${AUTOTRAIN_STAGING_DB_PORT:-}
      - AUTOTRAIN_STAGING_ROLE_SECRET=${AUTOTRAIN_STAGING_ROLE_SECRET:-}
    volumes:
      - ./dash-config.yaml:/app/dash-config.yaml:ro
      - ca_uploads:/app/backend/uploads
      - ca_branding:/app/backend/branding_uploads
      - ca_logs:/app/backend/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - ca-network

volumes:
  ca_postgres_data:
  ca_uploads:
  ca_branding:
  ca_logs:

networks:
  ca-network:
    driver: bridge
