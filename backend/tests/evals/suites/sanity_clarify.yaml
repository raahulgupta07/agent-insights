name: Sanity · Clarify
description: >
  Verifies the agent asks for clarification on genuinely ambiguous prompts
  rather than guessing. Runs against the Chinook demo so the agent has
  schema in scope but no obvious single interpretation of the question.

tags: [clarify]

data_source_slugs:
  - Music Store

cases:
  - name: vague_show_data
    prompt:
      content: "Show me the data"
    expectations:
      spec_version: 1
      order_mode: flexible
      rules:
        - type: tool.calls
          tool: clarify
          min_calls: 1
        - type: field
          target:
            category: "tool:clarify"
            field: question
          matcher:
            type: text.regex
            pattern: "(?i)(which|what|specify)"

  - name: ambiguous_best_performer
    prompt:
      content: "Who is our best performer this year?"
    expectations:
      spec_version: 1
      order_mode: flexible
      rules:
        - type: tool.calls
          tool: clarify
          min_calls: 1
        - type: field
          target:
            category: "tool:clarify"
            field: question
          matcher:
            type: text.regex
            pattern: "(?i)(which|what.*mean|metric|define|clarify|artist|track|genre|employee|customer)"
