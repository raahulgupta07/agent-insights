# Sandbox / load-testing config — local Postgres, local password auth, no SSO/telemetry.
deployment:
  type: "self_hosted"

base_url: http://localhost:8000

database:
  url: ${DASH_DATABASE_URL}

features:
  allow_uninvited_signups: true
  allow_multiple_organizations: false
  verify_emails: false

auth:
  mode: "local_only"

google_oauth:
  enabled: false

oidc_providers: []

encryption_key: ${DASH_ENCRYPTION_KEY}

smtp_settings:
  host: "smtp.resend.com"
  port: 587
  username: "resend"
  password: ${DASH_SMTP_PASSWORD}

swagger:
  enabled: true

intercom:
  enabled: false

telemetry:
  enabled: false
