# Deployment Configuration
deployment:
  type: "self_hosted"

base_url: http://localhost:3000

database:
  # url: sqlite:///db/app.db
  url: ${DASH_DATABASE_URL}
  
features:
  allow_uninvited_signups: false
  allow_multiple_organizations: false
  verify_emails: false

auth:
  mode: "sso_only"

google_oauth:
  enabled: false
  client_id: '${DASH_GOOGLE_CLIENT_ID}'
  client_secret: '${DASH_GOOGLE_CLIENT_SECRET}'

oidc_providers:
- name: okta
  enabled: false
  issuer: https://trial-9381896.okta.com/oauth2/default
  client_id: ${OKTA_CLIENT_ID}
  client_secret: ${OKTA_CLIENT_SECRET}
  scopes: ["openid", "profile", "email"]
  pkce: true
  client_auth_method: basic
  discovery: true
  uid_claim: sub
 # Optional overrides:
 # redirect_path: /api/auth/okta/callback
 # extra_authorize_params: { prompt: login }
 # extra_token_params: {}
- name: entra
  enabled: true
  issuer: https://login.microsoftonline.com/3871cb7e-3f16-4b81-84c5-1a5e185509f9/v2.0
  client_id: a9010cd3-08ff-451b-b041-5007a94ba677
  client_secret: ${DASH_ENTRA_CLIENT_SECRET}
  scopes: ["openid", "profile", "email", "api://a9010cd3-08ff-451b-b041-5007a94ba677/access_as_user"]
  pkce: true
  client_auth_method: post
  discovery: true
  uid_claim: sub
  sync_groups: true
  group_claim: "groups"
  resolve_group_names: true
# ldap:
#  enabled: true
#  url: ldaps://ad.company.com:636
#  bind_dn: cn=service-account,ou=Services,dc=company,dc=com
#  bind_password: ${DASH_LDAP_BIND_PASSWORD}

encryption_key: ${DASH_ENCRYPTION_KEY}

# Default LLM provider seeded for every NEW organization.
# OpenRouter (OpenAI-compatible) with the current model set. The API key is
# left blank on purpose — the user pastes their own OpenRouter key from the UI
# (Settings -> Models). is_preset:false keeps it editable. Never commit a key.
default_llm:
  - provider_type: custom
    provider_name: OpenRouter
    api_key: ""
    is_preset: false
    additional_config:
      base_url: https://openrouter.ai/api/v1
      verify_ssl: true
    models:
      - { model_id: anthropic/claude-sonnet-4.6, model_name: Claude Sonnet 4.6, is_default: true }
      - { model_id: anthropic/claude-haiku-4.5, model_name: Claude Haiku 4.5, is_small_default: true }
      - { model_id: anthropic/claude-opus-4.8, model_name: Claude Opus 4.8 }
      - { model_id: openai/gpt-5.4-mini, model_name: GPT-5.4 Mini }
      - { model_id: google/gemini-2.5-flash, model_name: Gemini 2.5 Flash }

smtp_settings:
  host: "smtp.resend.com"
  port: 587
  username: "resend"
  password: ${DASH_SMTP_PASSWORD}

swagger:
  enabled: true

intercom:
  enabled: true

telemetry:
  enabled: false

license:
  key: ${DASH_LICENSE_KEY}
