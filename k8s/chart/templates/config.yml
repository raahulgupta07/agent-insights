apiVersion: v1
kind: ConfigMap
metadata:
  name: dashapp
  namespace: {{.Release.Namespace}}
data:
  {{- if ne (default "password" .Values.database.auth.provider) "password" }}
  # Managed database with IAM auth — password is generated at runtime
  DASH_DATABASE_AUTH_PROVIDER: {{ .Values.database.auth.provider | quote }}
  DASH_DATABASE_HOST: {{ .Values.database.host | quote }}
  DASH_DATABASE_PORT: {{ .Values.database.port | quote }}
  DASH_DATABASE_USER: {{ .Values.database.username | quote }}
  DASH_DATABASE_NAME: {{ .Values.database.name | quote }}
  {{- if .Values.database.auth.region }}
  DASH_DATABASE_AUTH_REGION: {{ .Values.database.auth.region | quote }}
  {{- end }}
  {{- if .Values.database.auth.sslMode }}
  DASH_DATABASE_SSL_MODE: {{ .Values.database.auth.sslMode | quote }}
  {{- end }}
  {{- else }}
  # Database URL - only set if not using existing secret
  {{- if (empty .Values.postgresql.auth.existingSecret) }}
  {{- if (empty .Values.database.host)}}
  DASH_DATABASE_URL: postgresql://{{.Values.postgresql.auth.username}}:{{.Values.postgresql.auth.password}}@{{.Release.Name}}-postgresql:5432/{{.Values.postgresql.auth.database}}
  {{- else }}
  DASH_DATABASE_URL: postgresql://{{.Values.postgresql.auth.username}}:{{.Values.postgresql.auth.password}}@{{.Values.database.host}}:5432/{{.Values.postgresql.auth.database}}
  {{- end }}
  {{- end }}
  {{- end }}

  # Application configuration
  DASH_BASE_URL: {{ .Values.config.baseUrl | quote }}
  DASH_AUTH_MODE: {{ .Values.config.authMode | quote }}
  DASH_GOOGLE_AUTH_ENABLED: {{ .Values.config.googleOauthEnabled | quote }}
  DASH_INTERCOM_ENABLED: {{ .Values.config.intercomEnabled | quote }}
  DASH_TELEMETRY_ENABLED: {{ .Values.config.telemetryEnabled | quote }}
  DASH_ALLOW_UNINVITED_SIGNUPS: {{ .Values.config.allowUninvitedSignups | quote }}
  DASH_ALLOW_MULTIPLE_ORGANIZATIONS: {{ .Values.config.allowMultipleOrganizations | quote }}
  DASH_VERIFY_EMAILS: {{ .Values.config.verifyEmails | quote }}

  # Sensitive values: emit to ConfigMap only when set as a literal (not a ${VAR} placeholder).
  # Recommended pattern is to provide these via config.secretRef; see README.md.
  {{- if and .Values.config.encryptionKey (not (hasPrefix "${" .Values.config.encryptionKey)) }}
  DASH_ENCRYPTION_KEY: {{ .Values.config.encryptionKey | quote }}
  {{- end }}
  {{- if and .Values.config.googleClientId (not (hasPrefix "${" .Values.config.googleClientId)) }}
  DASH_GOOGLE_CLIENT_ID: {{ .Values.config.googleClientId | quote }}
  {{- end }}
  {{- if and .Values.config.googleClientSecret (not (hasPrefix "${" .Values.config.googleClientSecret)) }}
  DASH_GOOGLE_CLIENT_SECRET: {{ .Values.config.googleClientSecret | quote }}
  {{- end }}
  {{- if and .Values.config.licenseKey (not (hasPrefix "${" .Values.config.licenseKey)) }}
  DASH_LICENSE_KEY: {{ .Values.config.licenseKey | quote }}
  {{- end }}

  # SMTP — Helm-only `enabled` is a render gate; SMTPSettings has no `enabled` field.
  # `host` is required when SMTP is on (also implicitly enabled if `host` is set).
  {{- $smtpOn := or .Values.config.smtp.enabled .Values.config.smtp.host -}}
  {{- if $smtpOn }}
  {{- if not .Values.config.smtp.host }}
  {{- fail "config.smtp.host is required when SMTP is enabled" }}
  {{- end }}
  DASH_SMTP_HOST: {{ .Values.config.smtp.host | quote }}
  DASH_SMTP_PORT: {{ .Values.config.smtp.port | quote }}
  DASH_SMTP_USERNAME: {{ .Values.config.smtp.username | quote }}
  DASH_SMTP_FROM_NAME: {{ .Values.config.smtp.from_name | quote }}
  DASH_SMTP_FROM_EMAIL: {{ .Values.config.smtp.from_email | quote }}
  DASH_SMTP_USE_TLS: {{ .Values.config.smtp.use_tls | quote }}
  DASH_SMTP_USE_SSL: {{ .Values.config.smtp.use_ssl | quote }}
  DASH_SMTP_USE_CREDENTIALS: {{ .Values.config.smtp.use_credentials | quote }}
  DASH_SMTP_VALIDATE_CERTS: {{ .Values.config.smtp.validate_certs | quote }}
  {{- if and .Values.config.smtp.password (not (hasPrefix "${" .Values.config.smtp.password)) }}
  DASH_SMTP_PASSWORD: {{ .Values.config.smtp.password | quote }}
  {{- end }}
  {{- end }}

  {{- if .Values.config.uvicornWorkers }}
  UVICORN_WORKERS: {{ .Values.config.uvicornWorkers | quote }}
  {{- end }}

  dashConfig: |
    # Deployment Configuration
    base_url: ${DASH_BASE_URL}

    # Feature Flags
    features:
      allow_uninvited_signups: ${DASH_ALLOW_UNINVITED_SIGNUPS}
      allow_multiple_organizations: ${DASH_ALLOW_MULTIPLE_ORGANIZATIONS}
      verify_emails: ${DASH_VERIFY_EMAILS}

    auth:
      mode: ${DASH_AUTH_MODE}

    google_oauth:
      enabled: ${DASH_GOOGLE_AUTH_ENABLED}
      client_id: ${DASH_GOOGLE_CLIENT_ID}
      client_secret: ${DASH_GOOGLE_CLIENT_SECRET}

    encryption_key: ${DASH_ENCRYPTION_KEY}

{{- if $smtpOn }}
    smtp_settings:
      host: ${DASH_SMTP_HOST}
      port: ${DASH_SMTP_PORT}
      username: ${DASH_SMTP_USERNAME}
      password: ${DASH_SMTP_PASSWORD}
      from_name: ${DASH_SMTP_FROM_NAME}
      from_email: ${DASH_SMTP_FROM_EMAIL}
      use_tls: ${DASH_SMTP_USE_TLS}
      use_ssl: ${DASH_SMTP_USE_SSL}
      use_credentials: ${DASH_SMTP_USE_CREDENTIALS}
      validate_certs: ${DASH_SMTP_VALIDATE_CERTS}
{{- end }}

    intercom:
      enabled: ${DASH_INTERCOM_ENABLED}

    telemetry:
      enabled: ${DASH_TELEMETRY_ENABLED}

    license:
      key: ${DASH_LICENSE_KEY}

    otel:
      enabled: {{ .Values.config.otel.enabled | quote }}
      serviceName: {{ .Values.config.otel.serviceName | quote }}
      tracesEndpoint: {{ .Values.config.otel.tracesEndpoint | quote }}
      protocol: {{ .Values.config.otel.protocol | quote }}
      headers: {{ .Values.config.otel.headers | quote }}

{{- if .Values.config.ldap.enabled }}
    # LDAP / Active Directory
    # bind_password is read from env DASH_LDAP_BIND_PASSWORD — provide via config.secretRef
    ldap:
      enabled: true
      url: {{ .Values.config.ldap.url | quote }}
{{- if .Values.config.ldap.bindDn }}
      bind_dn: {{ .Values.config.ldap.bindDn | quote }}
{{- end }}
      bind_password: ${DASH_LDAP_BIND_PASSWORD}
      use_ssl: {{ .Values.config.ldap.useSsl }}
      start_tls: {{ .Values.config.ldap.startTls }}
      base_dn: {{ .Values.config.ldap.baseDn | quote }}
{{- if .Values.config.ldap.userSearchBase }}
      user_search_base: {{ .Values.config.ldap.userSearchBase | quote }}
{{- end }}
      user_search_filter: {{ .Values.config.ldap.userSearchFilter | quote }}
      user_email_attribute: {{ .Values.config.ldap.userEmailAttribute | quote }}
      user_name_attribute: {{ .Values.config.ldap.userNameAttribute | quote }}
{{- if .Values.config.ldap.groupSearchBase }}
      group_search_base: {{ .Values.config.ldap.groupSearchBase | quote }}
{{- end }}
      group_search_filter: {{ .Values.config.ldap.groupSearchFilter | quote }}
      group_name_attribute: {{ .Values.config.ldap.groupNameAttribute | quote }}
      group_member_attribute: {{ .Values.config.ldap.groupMemberAttribute | quote }}
      group_member_format: {{ .Values.config.ldap.groupMemberFormat | quote }}
      sync_interval_minutes: {{ .Values.config.ldap.syncIntervalMinutes }}
      auto_provision_users: {{ .Values.config.ldap.autoProvisionUsers }}
      connection_timeout: {{ .Values.config.ldap.connectionTimeout }}
      page_size: {{ .Values.config.ldap.pageSize }}
{{- end }}

    # OpenID Connect providers
    oidc_providers:
{{- if .Values.config.oidcProviders }}
{{- range $idx, $p := .Values.config.oidcProviders }}
      - name: {{ $p.name | quote }}
        enabled: {{ (default true $p.enabled) }}
        issuer: {{ $p.issuer | quote }}
        client_id: {{ $p.clientId | quote }}
        client_secret: {{ $p.clientSecret | quote }}
        scopes: {{ (default (list "openid" "profile" "email") $p.scopes) | toJson }}
        pkce: {{ (default true $p.pkce) }}
        client_auth_method: {{ (default "basic" $p.clientAuthMethod) | quote }}
        discovery: {{ (default true $p.discovery) }}
        uid_claim: {{ (default "sub" $p.uidClaim) | quote }}
{{- if $p.label }}
        label: {{ $p.label | quote }}
{{- end }}
{{- if $p.icon }}
        icon: {{ $p.icon | quote }}
{{- end }}
{{- if $p.redirectPath }}
        redirect_path: {{ $p.redirectPath | quote }}
{{- end }}
{{- if $p.extraAuthorizeParams }}
        extra_authorize_params: {{ $p.extraAuthorizeParams | toJson }}
{{- end }}
{{- if $p.extraTokenParams }}
        extra_token_params: {{ $p.extraTokenParams | toJson }}
{{- end }}
        sync_groups: {{ default false $p.syncGroups }}
        group_claim: {{ default "groups" $p.groupClaim | quote }}
        resolve_group_names: {{ default false $p.resolveGroupNames }}
{{- end }}
{{- else }}
      []
{{- end }}
