# =============================================================================
# CityAgent Analytics — ALL-IN-ONE STACK + Nginx Proxy Manager (HTTPS via GUI)
# =============================================================================
# This is docker-compose.build.yaml + an nginx-proxy-manager (NPM) container in
# front. It uses the SAME identity as the build stack — container names ca-app /
# ca-postgres / ca-redis, network ca-network, volumes ca_postgres_data / ca_* —
# so it shares the SAME database and NPM can resolve the app by container name.
#
#   internet ─80/443─▶ nginx-proxy-manager (admin GUI :81) ──▶ ca-app:3000
#                                                              ca-postgres, ca-redis
#
# ⚠ WHY the earlier NPM attempt showed no UI: NPM must be on the SAME docker
#   network as the app. A separate NPM (its own compose / own network) cannot
#   resolve `ca-app` → every request 502s. This file puts NPM on `ca-network`, so
#   `Forward Hostname = ca-app` works. Also: the app listens on port 3000 (NOT
#   8077 like Aria) — forward to 3000.
#
# The app is NOT published to a host port here — NPM reaches it internally as
# http://ca-app:3000. (This file is a drop-in replacement for build.yaml in prod;
# do not run both at once — they share container names + volumes.)
#
# START (prod, on the AWS box):
#   docker compose -f docker-compose.npm.yaml --env-file .env up -d --build
#
# THEN open the NPM admin UI:  http://<SERVER_IP>:81
#   first login: admin@example.com / changeme   (forces a change on first login)
#   → Hosts → Proxy Hosts → Add Proxy Host:
#        Domain Names        = insights.citygpt.xyz
#        Scheme              = http
#        Forward Hostname    = ca-app        ← container name, NOT an IP, NOT "app", NOT 8077
#        Forward Port        = 3000          ← the app's INTERNAL port
#        [x] Block Common Exploits   [x] Websockets Support
#        SSL tab   → request a new Let's Encrypt cert, [x] Force SSL, [x] HTTP/2
#        ADVANCED  → paste the streaming block below (REQUIRED).
#
#   ⚠ STREAMING (REQUIRED): CityAgent streams chat token-by-token (SSE). NPM buffers
#     by default → chat looks frozen until the whole answer lands. In the proxy
#     host's ADVANCED tab, paste:
#         proxy_buffering off;
#         proxy_cache off;
#         proxy_request_buffering off;
#         proxy_http_version 1.1;
#         proxy_read_timeout 3600s;
#         proxy_send_timeout 3600s;
#         client_max_body_size 0;
#
#   DNS: point insights.citygpt.xyz → SERVER public IP first; open 80 + 443 (+ 81
#        for the UI, ideally restricted to your IP) in the cloud security group.
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg18   # PG18 + pgvector preinstalled
    container_name: ca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashpassword}
      POSTGRES_DB: ${POSTGRES_DB:-dash}
    volumes:
      - ca_postgres_data:/var/lib/postgresql   # PG18+: mount the parent, NOT /data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dash} -d ${POSTGRES_DB:-dash}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ca-network

  redis:
    image: redis:7-alpine
    container_name: ca-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - ca-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cityagent-analytics:dev
    container_name: ca-app
    restart: unless-stopped
    # Hard container memory cap (cgroup real cap) so the app OOMs cleanly instead of
    # thrashing the host. Single-host `docker compose` HONORS mem_limit. Engineer:
    # set to ~0.7 * total box RAM.
    mem_limit: ${APP_MEM_LIMIT:-12g}
    # NOT published to a host port — NPM proxies to it internally as ca-app:3000.
    # (Add `ports: ["${APP_PORT:-3007}:3000"]` only if you also want direct access.)
    expose:
      - "3000"
    environment:
      - ENVIRONMENT=production
      - DASH_DATABASE_URL=postgresql://${POSTGRES_USER:-dash}:${POSTGRES_PASSWORD:-dashpassword}@postgres:5432/${POSTGRES_DB:-dash}
      - DASH_ENCRYPTION_KEY=${DASH_ENCRYPTION_KEY:-}
      - DASH_LICENSE_KEY=${DASH_LICENSE_KEY:-}
      - DASH_CONFIG_PATH=/app/dash-config.yaml
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SANDBOX_MEM_LIMIT_MB=${SANDBOX_MEM_LIMIT_MB:-0}
      - DASH_ADMIN_EMAIL=${DASH_ADMIN_EMAIL:-}
      - DASH_ADMIN_PASSWORD=${DASH_ADMIN_PASSWORD:-}
      - DASH_ADMIN_NAME=${DASH_ADMIN_NAME:-Admin}
      - AUTOTRAIN_STAGING_DB_USER=${AUTOTRAIN_STAGING_DB_USER:-}
      - AUTOTRAIN_STAGING_DB_PASSWORD=${AUTOTRAIN_STAGING_DB_PASSWORD:-}
      - AUTOTRAIN_STAGING_DB_HOST=${AUTOTRAIN_STAGING_DB_HOST:-}
      - AUTOTRAIN_STAGING_DB_PORT=${AUTOTRAIN_STAGING_DB_PORT:-}
      - AUTOTRAIN_STAGING_ROLE_SECRET=${AUTOTRAIN_STAGING_ROLE_SECRET:-}
    volumes:
      - ./dash-config.yaml:/app/dash-config.yaml:ro
      - ca_uploads:/app/backend/uploads
      - ca_branding:/app/backend/branding_uploads
      - ca_logs:/app/backend/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - ca-network

  # Nginx Proxy Manager — GUI reverse proxy + Let's Encrypt. On ca-network so
  # `Forward Hostname = ca-app` resolves. Add the domain + HTTPS in its web UI.
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: ca-npm
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP + ACME (Let's Encrypt) challenge
      - "443:443"    # HTTPS
      - "81:81"      # admin web UI (http://SERVER_IP:81) — restrict to your IP in the SG
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - ca-network

volumes:
  ca_postgres_data:
  ca_uploads:
  ca_branding:
  ca_logs:
  npm_data:
  npm_letsencrypt:

networks:
  ca-network:
    driver: bridge
